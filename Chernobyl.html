<!DOCTYPE html>
<html lang="en" class="bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE_4 // STATE_EXISTENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400&family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        body { cursor: crosshair; overflow: hidden; background-color: #000; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .display { font-family: 'Inter', sans-serif; letter-spacing: -0.05em; }
        
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.04;
            pointer-events: none;
            z-index: 50;
        }

        .scanline {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            position: absolute;
            animation: scan 15s linear infinite;
            z-index: 20;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            /* FILTERS REMOVED: RAW OUTPUT ONLY */
        }

        .ui-layer {
            position: relative;
            z-index: 30;
            pointer-events: none;
        }

        button { pointer-events: auto; }
    </style>
</head>
<body class="text-zinc-500 selection:bg-zinc-800 selection:text-white">

    <div class="noise"></div>
    <div class="scanline"></div>

    <div id="canvas-container"></div>

    <main class="ui-layer h-screen w-full flex flex-col justify-between p-8 md:p-12">
        
        <header class="flex justify-between items-start">
            <div class="mono text-[10px] uppercase tracking-[0.3em] leading-relaxed">
                <p>Object: Unit_4_Reactor</p>
                <p>Status: Persistent</p>
                <p>Coordinates: 51.3898° N, 30.0997° E</p>
            </div >
            <div class="mono text-[10px] text-right">
                <p id="timestamp">00:00:00:00</p>
                <p class="text-zinc-700">DECAY_LOG_ACTIVE</p>
            </div >
        </header>

        <section class="flex flex-col items-center justify-center text-center">
            <h1 class="display text-[12vw] leading-none text-white opacity-20 select-none">
                EXISTENCE
            </h1>
        </section>

        <footer class="grid grid-cols-1 md:grid-cols-3 gap-8 border-t border-zinc-900 pt-8">
            <div class="mono text-[10px]">
                <p class="text-zinc-700 mb-2">THERMAL_STASIS</p>
                <div class="w-full bg-zinc-900 h-[1px]">
                    <div class="bg-zinc-400 h-[1px] w-[38%]"></div>
                </div>
                <p class="mt-2 text-zinc-600">STABLE_REMAINDER</p>
            </div >

            <div class="mono text-[10px] flex flex-col justify-center items-center">
                <button class="border border-zinc-800 px-8 py-2 text-zinc-500 hover:bg-white hover:text-black transition-colors duration-300 text-[9px] tracking-widest">
                    CEASE OBSERVATION
                </button>
            </div >

            <div class="mono text-[10px] text-right flex flex-col justify-end">
                <p class="text-zinc-700 mb-2">ISOTOPE_DENSITY</p>
                <p class="text-zinc-300">CONSTANT</p>
                <p class="text-zinc-800">NO VARIANCE DETECTED</p>
            </div >
        </footer>
    </main>

    <script>
        // 1. Three.js: The Unfiltered Field
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Particle Count increased for density
        const particleCount = 12000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount; i++) {
            // Concentrated vertical column (The Shaft)
            const theta = Math.random() * Math.PI * 2;
            const radius = Math.pow(Math.random(), 3) * 100; // Extreme concentration at center
            
            positions[i * 3] = Math.cos(theta) * radius;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 1000; 
            positions[i * 3 + 2] = Math.sin(theta) * radius;

            // Raw White/Grey - No transparency or dimming in the color definition itself
            const val = 0.5 + Math.random() * 0.5;
            colors[i * 3] = val;
            colors[i * 3 + 1] = val;
            colors[i * 3 + 2] = val;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Material: Zero opacity dampening. 
        // Using basic PointsMaterial with high visibility.
        const material = new THREE.PointsMaterial({
            size: 1.5,
            vertexColors: true,
            transparent: false, // REMOVED OPACITY
            opacity: 1.0,       // REMOVED OPACITY
            blending: THREE.NormalBlending // REMOVED ADDITIVE (Pure presence)
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        camera.position.z = 600;

        function animate() {
            requestAnimationFrame(animate);
            
            // Slow, non-negotiable rotation
            points.rotation.y += 0.0002;
            points.rotation.z += 0.0001;

            renderer.render(scene, camera);
        }
        animate();

        // 2. Telemetry
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const ms = String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0');
            document.getElementById('timestamp').innerText = `${h}:${m}:${s}:${ms}`;
            requestAnimationFrame(updateClock);
        }
        updateClock();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
