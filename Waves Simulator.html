<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manhattan Wave Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #02040a; }
        canvas { display: block; }
        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="fixed top-6 left-6 z-10 w-80 flex flex-col gap-4 pointer-events-none">
        <div class="glass p-6 rounded-2xl text-white pointer-events-auto shadow-2xl">
            <h1 class="text-xl font-bold mb-1 tracking-tight">Wave Physics</h1>
            <p class="text-[10px] text-blue-400 mb-6 uppercase tracking-[0.2em]">Manhattan Bridge Interference</p>
            
            <div class="space-y-5">
                <div>
                    <div class="flex justify-between text-xs mb-2 opacity-70"><span>Frequency</span><span id="freq-val">1.5</span></div>
                    <input type="range" id="freq" min="0.1" max="4.0" step="0.1" value="1.5" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                </div>

                <div>
                    <div class="flex justify-between text-xs mb-2 opacity-70"><span>Amplitude</span><span id="amp-val">0.4</span></div>
                    <input type="range" id="amp" min="0.1" max="1.5" step="0.1" value="0.4" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                </div>

                <div>
                    <div class="flex justify-between text-xs mb-2 opacity-70"><span>Wave Speed</span><span id="speed-val">3.0</span></div>
                    <input type="range" id="speed" min="1.0" max="8.0" step="0.5" value="3.0" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                </div>

                <div class="pt-4 border-t border-white/10">
                    <button id="clear-btn" class="w-full py-2 bg-red-500/10 hover:bg-red-500/30 text-red-400 text-[10px] font-bold rounded-lg transition-all border border-red-500/20 uppercase tracking-widest">
                        Reset Sources
                    </button>
                </div>
            </div>
        </div>
        <div class="glass px-4 py-2 rounded-full text-[10px] text-slate-400 w-fit pointer-events-auto border border-white/5">
            CLICK WATER TO ADD WAVE SOURCE
        </div>
    </div>

    <!-- Shaders -->
    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uFrequency;
        uniform float uAmplitude;
        uniform float uSpeed;
        uniform vec2 uSources[10];
        uniform int uSourceCount;

        varying float vElevation;

        void main() {
            vec4 modelPosition = modelMatrix * vec4(position, 1.0);
            float elevation = 0.0;

            // Corrected Physics: Explicitly use xz components for distance
            for (int i = 0; i < 10; i++) {
                if (i >= uSourceCount) break;
                
                float dist = distance(modelPosition.xz, uSources[i]);
                // Interference formula
                elevation += sin(dist * uFrequency - uTime * uSpeed) * uAmplitude;
            }

            modelPosition.y += elevation;
            vElevation = elevation;

            gl_Position = projectionMatrix * modelViewMatrix * modelPosition;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float vElevation;
        
        void main() {
            vec3 deepColor = vec3(0.01, 0.04, 0.1);
            vec3 midColor = vec3(0.05, 0.2, 0.4);
            vec3 crestColor = vec3(0.3, 0.7, 1.0);
            vec3 foamColor = vec3(0.9, 1.0, 1.0);

            vec3 color = mix(deepColor, midColor, smoothstep(-1.5, 0.2, vElevation));
            color = mix(color, crestColor, smoothstep(0.2, 0.7, vElevation));
            color = mix(color, foamColor, smoothstep(0.7, 1.2, vElevation));

            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <script>
        let scene, camera, renderer, waterMesh, raycaster, mouse;
        const sources = [];
        const MAX_SOURCES = 10;

        const uniforms = {
            uTime: { value: 0 },
            uFrequency: { value: 1.5 },
            uAmplitude: { value: 0.4 },
            uSpeed: { value: 3.0 },
            uSources: { value: Array.from({ length: MAX_SOURCES }, () => new THREE.Vector2(0, 0)) },
            uSourceCount: { value: 0 }
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010308);
            scene.fog = new THREE.FogExp2(0x010308, 0.03);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 18, 30);
            camera.lookAt(0, 0, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const dirLight = new THREE.DirectionalLight(0x4466ff, 1);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            createBridge();
            createWater();

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousedown', onClick);
            setupUI();

            animate();
        }

        function createBridge() {
            const bridge = new THREE.Group();
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.8 });
            const metalMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.3 });

            // Main Towers (Pylons)
            const pylonGeo = new THREE.BoxGeometry(1.5, 20, 1.5);
            const p1 = new THREE.Mesh(pylonGeo, darkMat);
            p1.position.set(-12, 8, -5);
            const p2 = new THREE.Mesh(pylonGeo, darkMat);
            p2.position.set(12, 8, -5);
            bridge.add(p1, p2);

            // Roadway
            const roadGeo = new THREE.BoxGeometry(40, 0.6, 4);
            const road = new THREE.Mesh(roadGeo, darkMat);
            road.position.set(0, 15, -5);
            bridge.add(road);

            // Suspension Cables (The Big Curves)
            const curvePoints = [
                new THREE.Vector3(-12, 15, -5),
                new THREE.Vector3(0, 5, -5),
                new THREE.Vector3(12, 15, -5)
            ];
            const curve = new THREE.CatmullRomCurve3(curvePoints);
            const cableGeo = new THREE.TubeGeometry(curve, 64, 0.15, 8, false);
            bridge.add(new THREE.Mesh(cableGeo, metalMat));

            // Vertical Suspenders (The small lines)
            for(let x = -11; x <= 11; x += 2) {
                const yPos = (x < 0) ? 
                    Math.abs(x/12) * 10 + 5 : // Very simplified curve logic for suspenders
                    (1 - Math.abs(x/12)) * 10 + 5; 
                
                const sGeo = new THREE.CylinderGeometry(0.04, 0.04, 12);
                const suspender = new THREE.Mesh(sGeo, metalMat);
                suspender.position.set(x, 9, -5);
                bridge.add(suspender);
            }

            scene.add(bridge);
        }

        function createWater() {
            // Higher subdivision for smoother waves
            const geometry = new THREE.PlaneGeometry(80, 80, 256, 256);
            geometry.rotateX(-Math.PI / 2);

            const material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true
            });

            waterMesh = new THREE.Mesh(geometry, material);
            scene.add(waterMesh);
        }

        function onClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(waterMesh);

            if (intersects.length > 0 && sources.length < MAX_SOURCES) {
                const p = intersects[0].point;
                sources.push(new THREE.Vector2(p.x, p.z));
                
                uniforms.uSources.value = Array.from({ length: MAX_SOURCES }, (_, i) => {
                    return sources[i] ? new THREE.Vector2(sources[i].x, sources[i].y) : new THREE.Vector2(0, 0);
                });
                uniforms.uSourceCount.value = sources.length;
            }
        }

        function setupUI() {
            const bind = (id, key, valId) => {
                const el = document.getElementById(id);
                el.addEventListener('input', () => {
                    const v = parseFloat(el.value);
                    uniforms[key].value = v;
                    document.getElementById(valId).innerText = v.toFixed(1);
                });
            };
            bind('freq', 'uFrequency', 'freq-val');
            bind('amp', 'uAmplitude', 'amp-val');
            bind('speed', 'uSpeed', 'speed-val');

            document.getElementById('clear-btn').addEventListener('click', () => {
                sources.length = 0;
                uniforms.uSourceCount.value = 0;
                uniforms.uSources.value = Array.from({ length: MAX_SOURCES }, () => new THREE.Vector2(0, 0));
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            uniforms.uTime.value += 0.02;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
